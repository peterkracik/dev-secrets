name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          name="devsecrets-${{ matrix.target }}"
          mkdir -p "dist/$name"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/devsecrets.exe" "dist/$name/"
          else
            cp "target/${{ matrix.target }}/release/devsecrets" "dist/$name/"
          fi
          cp README.md LICENSE "dist/$name/" 2>/dev/null || true
          cd dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "$name.zip" "$name" >/dev/null
            echo "asset=dist/$name.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "$name.tar.gz" "$name"
            echo "asset=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: devsecrets-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
          generate_release_notes: true

  # Bump the formula version in the Homebrew tap repo on every tagged release.
  # The formula builds from the git tag, so only the `version` line changes —
  # no checksums to compute.
  #
  # Requires a repo secret `TAP_GITHUB_TOKEN`: a token (fine-grained PAT or
  # similar) with contents:write on the tap repo. The default GITHUB_TOKEN
  # cannot push to another repository.
  update-tap:
    name: Update Homebrew tap
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Check out tap
        uses: actions/checkout@v4
        with:
          repository: peterkracik/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Bump formula version
        run: |
          version="${GITHUB_REF_NAME#v}"
          file="tap/Formula/devsecrets.rb"
          if [[ ! -f "$file" ]]; then
            echo "::error::$file not found in tap repo"
            exit 1
          fi
          sed -i -E "s/^(  version )\"[^\"]*\"/\1\"${version}\"/" "$file"
          cd tap
          if git diff --quiet; then
            echo "Formula already at ${version}; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "devsecrets ${version}"
          git push
