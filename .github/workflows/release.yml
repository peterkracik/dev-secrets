name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          name="devsecrets-${{ matrix.target }}"
          mkdir -p "dist/$name"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/devsecrets.exe" "dist/$name/"
          else
            cp "target/${{ matrix.target }}/release/devsecrets" "dist/$name/"
          fi
          cp README.md LICENSE "dist/$name/" 2>/dev/null || true
          cd dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "$name.zip" "$name" >/dev/null
            echo "asset=dist/$name.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "$name.tar.gz" "$name"
            echo "asset=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: devsecrets-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
          generate_release_notes: true
